<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Melodramaddy scratch 1</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <!-- Font Awesome icons (free version)-->
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <!-- Google fonts-->
        <link href="https://fonts.googleapis.com/css?family=Catamaran:100,200,300,400,500,600,700,800,900" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css?family=Lato:100,100i,300,300i,400,400i,700,700i,900,900i" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/styles.css" rel="stylesheet" />
        <style>

			/*
*
* ==========================================
* CUSTOM UTIL CLASSES
* ==========================================
*
*/

.video-background-holder {
  position: relative;
  background-color: black;
  height: calc(100vh - 72px);
  min-height: 25rem;
  width: 100%;
  overflow: hidden;
}

.video-background-holder video {
  position: absolute;
  top: 50%;
  left: 50%;
  min-width: 100%;
  min-height: 100%;
  width: auto;
  height: auto;
  z-index: 0;
  -ms-transform: translateX(-50%) translateY(-50%);
  -moz-transform: translateX(-50%) translateY(-50%);
  -webkit-transform: translateX(-50%) translateY(-50%);
  transform: translateX(-50%) translateY(-50%);
}

.video-background-content {
  position: relative;
  z-index: 2;
}

.video-background-overlay {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  width: 100%;
  background-color: black;
  opacity: 0.5;
  z-index: 1;
}

.gallery_button { 
	padding-inline: 0px;
	border-width: 0px;
	padding-block: 0px;
}

.gallery_image { 
	width: 60px; 
	height: auto; 
	pointer-events: auto;
}

.gallery_image_caption {
	margin-top: 0.1rem;
    margin-bottom: 0.5rem;
    font-size: 0.8rem;
    color: rgba(255, 255, 255, 1);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif, "Sans Serif", Icons;
    font-style: normal;
    line-height: 1.3;
    text-shadow: 1px 1px 3px #000;
    margin-left: -3rem;
    margin-right: -3rem;
}

.embed-responsive {
  position: absolute;
  float:inline-start;
  top: -200px;
  display: block;
  width: 100%;
}
        </style>



    </head>
    <body id="page-top">
<!-- Background video -->
<div class="video-background-holder">
   <div class="video-background-overlay"></div>
  <video playsinline="playsinline" autoplay="autoplay" muted="muted" loop="loop">
        <source src="assets/video/melodramaddy.mp4" type="video/mp4">
    </video>
  <div id="content" class="video-background-content container h-100"  ondrop="dropHandler(event)" ondragover="dragoverHandler(event)">
	<div id="displayFrameHolder" style="position:fixed; z-index: 2; top: 1%; left: 88%; display: none;">
	  <button type="button" class="btn-close"  aria-label="Close" onclick="endDisplay()"></button>
      <iframe id="displayFrame" style="position:fixed; z-index: 1; top: 5%; left: 10%; display: none;" width="80%" height="80%" marginheight="0" scrolling="auto" onload="" allowtransparency="false" allowfullscreen></iframe>
    </div>
   <div class="d-flex h-100 text-center align-items-center">
      <div class="w-100 text-white" style="position: fixed;  top: 100px; left: -45%;" draggable="true" ondragstart="dragstartHandler(event)"  >
		<button class="gallery_button" onclick="youtubePresent('RZ6HNa4dPgQ')">
			<img src="assets/img/ozzy.png" class="gallery_image"/>
		</button>
    	<div class="gallery_image_caption">Villa kit reveal</div>
	  </div>
      <div class="w-100 text-white" style="position: fixed; top: 200px; left: -40%;" draggable="true" ondragstart="dragstartHandler(event)"  >
		<button class="gallery_button" onclick="youtubePresent('zS885xB1Gq4')">
			<img src="assets/img/videoframe_37719.png" class="gallery_image"/>
		</button>
    	<div class="gallery_image_caption">Grenadier</div>
	  </div>
    </div>
  </div>
</div>
<!-- End -->
<script>

	let startX=0, startY=0;

function dragstartHandler(ev) {
    startX = ev.clientX;
    startY = ev.clientY;

}

function dragoverHandler(ev) {
  ev.preventDefault();
}

function dropHandler(ev) {
  ev.preventDefault();
    console.log(`Mouse moved to (${ev.clientX}, ${ev.clientY})`);
  const dx = ev.clientX - startX;
  const dy = ev.clientY - startY;
  ev.target.style.left = `${ev.target.offsetLeft + dx}px`;
  ev.target.style.top = `${ev.target.offsetTop + dy}px`;
 

}

function youtubePresent(videoId) {

	const url = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
	let displayFrameHolder = document.getElementById("displayFrameHolder");
	let displayFrame = document.getElementById("displayFrame");
	displayFrame.setAttribute("src", url);
	displayFrame.style.display = "block";
	displayFrameHolder.style.display = "block";

}

function endDisplay() {
	let displayFrameHolder = document.getElementById("displayFrameHolder");
	let displayFrame = document.getElementById("displayFrame");
	displayFrame.setAttribute("src", "");
	displayFrame.style.display = "none";
	displayFrameHolder.style.display = "none";

}


</script>
    </body>
</html>
